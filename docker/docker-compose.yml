version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: typogram-postgres
    restart: always
    environment:
      POSTGRES_USER: typogram
      POSTGRES_PASSWORD: typogram
      POSTGRES_DB: typogram
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: typogram-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: